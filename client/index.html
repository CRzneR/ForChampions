<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Turnier Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      .auth-container {
        background: linear-gradient(135deg, #21222d 0%, #14181d 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .auth-card {
        background: rgba(33, 34, 45, 0.9);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }
      .form-input {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        transition: all 0.3s ease;
      }
      .form-input:focus {
        outline: none;
        border-color: #ca5818;
        box-shadow: 0 0 0 3px rgba(202, 88, 24, 0.2);
      }
      .btn-primary {
        background: linear-gradient(to right, #ca5818, #ef1475);
        transition: all 0.3s ease;
      }
      .btn-primary:hover {
        background: linear-gradient(to right, #ef1475, #ca5818);
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(202, 88, 24, 0.4);
      }
    </style>
  </head>
  <body class="bg-[#14181D]">
    <!-- Login/Registrierungsbereich - initial sichtbar -->
    <div id="auth-container" class="auth-container">
      <div class="w-full max-w-md p-6">
        <!-- Logo und Titel -->
        <div class="text-center mb-8">
          <div class="flex justify-center mb-4">
            <div
              class="h-16 w-16 rounded-full bg-gradient-to-r from-[#CA5818] to-[#EF1475] flex items-center justify-center"
            >
              <i data-lucide="trophy" class="h-8 w-8 text-white"></i>
            </div>
          </div>
          <h1
            class="text-3xl font-bold bg-gradient-to-r from-[#CA5818] to-[#EF1475] bg-clip-text text-transparent"
          >
            For Champions
          </h1>
          <p class="text-gray-400 mt-2">Turnier Management System</p>
        </div>

        <!-- Login-Formular -->
        <div id="login-form-container" class="auth-card p-8 mb-6">
          <h2 class="text-xl font-semibold text-white mb-6 text-center">
            Anmelden
          </h2>
          <form id="login-form">
            <div class="mb-4">
              <label for="login-email" class="block text-gray-300 mb-2"
                >E-Mail</label
              >
              <input
                type="email"
                id="login-email"
                required
                class="w-full px-4 py-3 rounded-lg form-input"
                placeholder="deine@email.de"
              />
            </div>
            <div class="mb-6">
              <label for="login-password" class="block text-gray-300 mb-2"
                >Passwort</label
              >
              <input
                type="password"
                id="login-password"
                required
                class="w-full px-4 py-3 rounded-lg form-input"
                placeholder="Dein Passwort"
              />
            </div>
            <button
              type="submit"
              class="w-full py-3 rounded-lg text-white font-semibold btn-primary"
            >
              Anmelden
            </button>
          </form>
          <div id="login-message" class="mt-4 text-center text-sm"></div>
        </div>

        <!-- Registrierungs-Formular -->
        <div id="register-form-container" class="auth-card p-8 hidden">
          <h2 class="text-xl font-semibold text-white mb-6 text-center">
            Registrieren
          </h2>
          <form id="register-form">
            <div class="mb-4">
              <label for="register-username" class="block text-gray-300 mb-2"
                >Benutzername</label
              >
              <input
                type="text"
                id="register-username"
                required
                class="w-full px-4 py-3 rounded-lg form-input"
                placeholder="Wähle einen Benutzernamen"
              />
            </div>
            <div class="mb-4">
              <label for="register-email" class="block text-gray-300 mb-2"
                >E-Mail</label
              >
              <input
                type="email"
                id="register-email"
                required
                class="w-full px-4 py-3 rounded-lg form-input"
                placeholder="deine@email.de"
              />
            </div>
            <div class="mb-6">
              <label for="register-password" class="block text-gray-300 mb-2"
                >Passwort</label
              >
              <input
                type="password"
                id="register-password"
                required
                class="w-full px-4 py-3 rounded-lg form-input"
                placeholder="Erstelle ein sicheres Passwort"
              />
            </div>
            <button
              type="submit"
              class="w-full py-3 rounded-lg text-white font-semibold btn-primary"
            >
              Registrieren
            </button>
          </form>
          <div id="register-message" class="mt-4 text-center text-sm"></div>
        </div>

        <!-- Umschalter zwischen Login und Registrierung -->
        <div class="text-center">
          <p
            id="toggle-register"
            class="text-gray-400 cursor-pointer hover:text-[#CA5818] transition"
          >
            Noch kein Konto?
            <span class="font-semibold text-[#EF1475]">Jetzt registrieren</span>
          </p>
          <p
            id="toggle-login"
            class="text-gray-400 cursor-pointer hover:text-[#CA5818] transition hidden"
          >
            Bereits ein Konto?
            <span class="font-semibold text-[#EF1475]">Zum Login</span>
          </p>
        </div>
      </div>
    </div>

    <!-- Hauptanwendung - initial versteckt -->
    <div id="app-container" class="hidden">
      <!-- Hauptnavigation oben -->
      <nav class="bg-[#21222D] shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
          <div class="flex justify-between h-16">
            <div class="flex items-center">
              <div class="flex-shrink-0 flex items-center">
                <img
                  class="h-8 w-auto"
                  src="https://via.placeholder.com/150"
                  alt="Logo"
                />
                <span
                  class="ml-2 text-xl font-bold hidden"
                  id="tournament-title"
                ></span>
                <span
                  class="ml-2 text-4xl font-bold bg-gradient-to-r from-[#CA5818] to-[#EF1475] bg-clip-text text-transparent"
                  id="app-title"
                  >For Champions</span
                >
              </div>
            </div>
            <div class="flex items-center">
              <div class="ml-4 flex items-center md:ml-6">
                <span class="text-gray-300 mr-4" id="user-display-name"></span>
                <button
                  id="logout-button"
                  class="p-1 rounded-full text-gray-400 hover:text-gray-500 focus:outline-none"
                >
                  <span class="sr-only">Abmelden</span>
                  <i data-lucide="log-out" class="h-6 w-6"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
      </nav>

      <div class="flex">
        <!-- Vertikale Navigation links -->
        <div class="w-64 bg-[#21222D] shadow-md h-screen sticky top-0">
          <div class="p-4">
            <h2 class="text-lg text-white font-semibold mb-4">Navigation</h2>
            <ul class="space-y-2">
              <li>
                <button
                  data-tab="dashboard"
                  class="w-full text-left px-4 py-2 rounded hover:bg-[#99491C] hover:text-white text-gray-300 flex items-center"
                >
                  <i data-lucide="grid" class="w-5 h-5 mr-3"></i>
                  Dashboard
                </button>
              </li>
              <li>
                <button
                  data-tab="create"
                  class="w-full text-left px-4 py-2 rounded hover:bg-[#99491C] hover:text-white text-gray-300 flex items-center"
                >
                  <i data-lucide="plus" class="w-5 h-5 mr-3"></i>
                  Turnier erstellen
                </button>
              </li>
              <li>
                <button
                  data-tab="groups"
                  id="groups-tab"
                  class="w-full text-left px-4 py-2 rounded hover:bg-[#99491C] hover:text-white text-gray-300 flex items-center"
                >
                  <i data-lucide="users" class="w-5 h-5 mr-3"></i>
                  Gruppen
                </button>
              </li>
              <li>
                <button
                  data-tab="schedule"
                  class="w-full text-left px-4 py-2 rounded hover:bg-[#99491C] hover:text-white text-gray-300 flex items-center"
                >
                  <i data-lucide="calendar" class="w-5 h-5 mr-3"></i>
                  Spielplan
                </button>
              </li>
              <li>
                <button
                  data-tab="playoffs"
                  class="w-full text-left px-4 py-2 rounded hover:bg-[#99491C] hover:text-white text-gray-300 flex items-center"
                >
                  <i data-lucide="bar-chart-3" class="w-5 h-5 mr-3"></i>
                  Playoffs
                </button>
              </li>
              <li>
                <button
                  data-tab="settings"
                  class="w-full text-left px-4 py-2 rounded hover:bg-[#99491C] hover:text-white text-gray-300 flex items-center"
                >
                  <i data-lucide="settings" class="w-5 h-5 mr-3"></i>
                  Einstellungen
                </button>
              </li>
              <li>
                <button
                  class="w-full text-left px-4 py-2 rounded hover:bg-[#99491C] hover:text-white text-gray-300 flex items-center"
                >
                  <i data-lucide="help-circle" class="w-5 h-5 mr-3"></i>
                  Hilfe
                </button>
              </li>
            </ul>
          </div>
        </div>

        <!-- Hauptinhalt -->
        <div class="flex-1 p-8">
          <!-- Dashboard Tab -->
          <div id="dashboard-content" class="tab-content hidden">
            <div class="grid grid-cols-1 gap-6">
              <!-- Übersichtskarten -->
              <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- Turnierinfo Karte -->
                <div
                  class="bg-primary rounded-lg shadow-lg border border-gray-800 p-6"
                >
                  <h3 class="text-lg font-bold text-white mb-4">Turnierinfo</h3>
                  <div id="tournament-info-content" class="text-gray-300">
                    <!-- Wird von JavaScript gefüllt -->
                  </div>
                </div>

                <!-- Aktuelle Spiele Karte -->
                <div
                  class="bg-primary rounded-lg shadow-lg border border-gray-800 p-6"
                >
                  <h3 class="text-lg font-bold text-white mb-4">
                    Nächste Spiele
                  </h3>
                  <div id="current-matches-content">
                    <!-- Wird von JavaScript gefüllt -->
                  </div>
                </div>

                <!-- Top Teams Karte -->
                <div
                  class="bg-primary rounded-lg shadow-lg border border-gray-800 p-6"
                >
                  <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-bold text-white">Top Teams</h3>
                    <span
                      class="text-xs bg-green-900 text-green-400 px-2 py-1 rounded-full"
                    >
                      Playoff-Plätze
                    </span>
                  </div>
                  <div id="top-teams-content">
                    <!-- Wird von JavaScript gefüllt -->
                  </div>
                </div>
              </div>

              <!-- Gruppenübersicht -->
              <div
                class="bg-primary rounded-lg shadow-lg border border-gray-800"
              >
                <div class="px-6 py-4 border-b border-gray-800">
                  <h2 class="text-xl font-bold text-white">Gruppenübersicht</h2>
                  <p
                    id="dashboard-groups-info"
                    class="text-sm text-gray-400 mt-1"
                  >
                    <span id="dashboard-tournament-name"></span> Aktuelle
                    Gruppenstände
                  </p>
                </div>
                <div
                  id="dashboard-groups-container"
                  class="p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"
                ></div>
              </div>
            </div>
          </div>

          <!-- Turnier erstellen Tab -->
          <div id="create-content" class="tab-content hidden"></div>

          <!-- Gruppen Tab -->
          <div id="groups-content" class="tab-content hidden"></div>

          <!-- Spielplan Tab -->
          <div id="schedule-content" class="tab-content hidden"></div>

          <!-- Playoffs Tab -->
          <div id="playoffs-content" class="tab-content hidden"></div>
        </div>
      </div>
    </div>

    <!-- JavaScript Dateien -->
    <script src="/client/js/auth.js"></script>
    <script src="/client/js/app.js"></script>
    <script src="/client/js/create.js"></script>
    <script src="/client/js/groups.js"></script>
    <script src="/client/js/schedule.js"></script>
    <script src="/client/js/playoffs.js"></script>
    <script src="/client/js/dashboard.js"></script>
    <script>
      lucide.createIcons();

      // DOM nach Laden initialisieren
      document.addEventListener("DOMContentLoaded", function () {
        // Umschalter zwischen Login und Registrierung
        document
          .getElementById("toggle-register")
          .addEventListener("click", function () {
            document
              .getElementById("login-form-container")
              .classList.add("hidden");
            document
              .getElementById("register-form-container")
              .classList.remove("hidden");
            document.getElementById("toggle-register").classList.add("hidden");
            document.getElementById("toggle-login").classList.remove("hidden");
          });

        document
          .getElementById("toggle-login")
          .addEventListener("click", function () {
            document
              .getElementById("register-form-container")
              .classList.add("hidden");
            document
              .getElementById("login-form-container")
              .classList.remove("hidden");
            document.getElementById("toggle-login").classList.add("hidden");
            document
              .getElementById("toggle-register")
              .classList.remove("hidden");
          });

        // Login-Formular Handler
        document
          .getElementById("login-form")
          .addEventListener("submit", async function (e) {
            e.preventDefault();
            const email = document.getElementById("login-email").value;
            const password = document.getElementById("login-password").value;
            const messageDiv = document.getElementById("login-message");

            try {
              const response = await fetch("/api/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password }),
                credentials: "include",
              });

              const data = await response.json();

              if (data.success) {
                messageDiv.textContent = "Login erfolgreich!";
                messageDiv.className =
                  "mt-4 text-center text-sm text-green-400";

                // Benutzernamen anzeigen
                document.getElementById("user-display-name").textContent =
                  data.user.username;

                // Hauptanwendung anzeigen nach kurzer Verzögerung
                setTimeout(() => {
                  document
                    .getElementById("auth-container")
                    .classList.add("hidden");
                  document
                    .getElementById("app-container")
                    .classList.remove("hidden");
                }, 1000);
              } else {
                messageDiv.textContent = data.message;
                messageDiv.className = "mt-4 text-center text-sm text-red-400";
              }
            } catch (error) {
              messageDiv.textContent =
                "Ein Fehler ist aufgetreten. Bitte versuche es später erneut.";
              messageDiv.className = "mt-4 text-center text-sm text-red-400";
            }
          });

        // Registrierungs-Formular Handler
        document
          .getElementById("register-form")
          .addEventListener("submit", async function (e) {
            e.preventDefault();
            const username = document.getElementById("register-username").value;
            const email = document.getElementById("register-email").value;
            const password = document.getElementById("register-password").value;
            const messageDiv = document.getElementById("register-message");

            try {
              const response = await fetch("/api/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, email, password }),
              });

              const data = await response.json();

              if (data.success) {
                messageDiv.textContent =
                  "Registrierung erfolgreich! Du kannst dich jetzt anmelden.";
                messageDiv.className =
                  "mt-4 text-center text-sm text-green-400";

                // Zurück zum Login nach erfolgreicher Registrierung
                setTimeout(() => {
                  document
                    .getElementById("register-form-container")
                    .classList.add("hidden");
                  document
                    .getElementById("login-form-container")
                    .classList.remove("hidden");
                  document
                    .getElementById("toggle-login")
                    .classList.add("hidden");
                  document
                    .getElementById("toggle-register")
                    .classList.remove("hidden");
                  document.getElementById("login-email").value = email;
                }, 1500);
              } else {
                messageDiv.textContent = data.message;
                messageDiv.className = "mt-4 text-center text-sm text-red-400";
              }
            } catch (error) {
              messageDiv.textContent =
                "Ein Fehler ist aufgetreten. Bitte versuche es später erneut.";
              messageDiv.className = "mt-4 text-center text-sm text-red-400";
            }
          });

        // Logout-Button Handler
        document
          .getElementById("logout-button")
          .addEventListener("click", async function () {
            try {
              const response = await fetch("/api/logout", {
                method: "POST",
                credentials: "include",
              });

              const data = await response.json();

              if (data.success) {
                // Zurück zum Login-Bildschirm
                document
                  .getElementById("app-container")
                  .classList.add("hidden");
                document
                  .getElementById("auth-container")
                  .classList.remove("hidden");

                // Formulare zurücksetzen
                document.getElementById("login-form").reset();
                document.getElementById("register-form").reset();
              }
            } catch (error) {
              console.error("Logout fehlgeschlagen:", error);
            }
          });

        // Beim Laden prüfen, ob bereits eine Session besteht
        checkAuthStatus();
      });

      // Funktion zum Prüfen des Authentifizierungsstatus
      async function checkAuthStatus() {
        try {
          const response = await fetch("/api/user", {
            credentials: "include",
          });

          if (response.ok) {
            const data = await response.json();
            if (data.success) {
              // Benutzer ist angemeldet, Hauptanwendung anzeigen
              document.getElementById("user-display-name").textContent =
                data.user.username;
              document.getElementById("auth-container").classList.add("hidden");
              document
                .getElementById("app-container")
                .classList.remove("hidden");
            }
          }
        } catch (error) {
          console.error("Auth-Check fehlgeschlagen:", error);
        }
      }
    </script>
  </body>
</html>
