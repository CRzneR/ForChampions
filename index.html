<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Turnier Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body class="bg-[#14181D]">
    <!-- Hauptnavigation oben -->
    <nav class="bg-[#21222D] shadow-md">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
          <div class="flex items-center">
            <div class="flex-shrink-0 flex items-center">
              <img
                class="h-8 w-auto"
                src="https://via.placeholder.com/150"
                alt="Logo"
              />
              <span
                class="ml-2 text-xl font-bold hidden"
                id="tournament-title"
              ></span>
              <span
                class="ml-2 text-xl font-bold text-4xl font-bold bg-gradient-to-r from-[#CA5818] to-[#EF1475] bg-clip-text text-transparent"
                id="app-title"
                >For Champions</span
              >
            </div>
          </div>
          <div class="flex items-center">
            <div class="ml-4 flex items-center md:ml-6">
              <button
                class="p-1 rounded-full text-gray-400 hover:text-gray-500 focus:outline-none"
              >
                <span class="sr-only">Profil</span>
                <svg
                  class="h-6 w-6"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
                  />
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <div class="flex">
      <!-- Vertikale Navigation links -->
      <div class="w-64 bg-[#21222D] shadow-md h-screen sticky top-0">
        <div class="p-4">
          <h2 class="text-lg text-white font-semibold mb-4">Navigation</h2>
          <ul class="space-y-2">
            <li>
              <button
                data-tab="create"
                class="w-full text-left px-4 py-2 rounded hover:bg-[#99491C] hover:text-white text-gray-700"
              >
                Turnier erstellen
              </button>
            </li>
            <li>
              <button
                data-tab="groups"
                id="groups-tab"
                class="w-full text-left px-4 py-2 rounded hover:bg-[#99491C] hover:text-white text-gray-700"
              >
                Gruppen
              </button>
            </li>
            <li>
              <button
                data-tab="schedule"
                class="w-full text-left px-4 py-2 rounded hover:bg-[#99491C] hover:text-white text-gray-700"
              >
                Spielplan
              </button>
            </li>
            <li>
              <button
                data-tab="playoffs"
                class="w-full text-left px-4 py-2 rounded hover:bg-[#99491C] hover:text-white text-gray-700"
              >
                Playoffs
              </button>
            </li>
          </ul>
        </div>
      </div>

      <!-- Hauptinhalt -->
      <div class="flex-1 p-8">
        <!-- Turnier erstellen Tab -->
        <div id="create-content" class="tab-content hidden">
          <!-- Wird von create.js gefüllt -->
        </div>

        <!-- Gruppen Tab -->
        <div id="groups-content" class="tab-content hidden">
          <!-- Wird von groups.js gefüllt -->
        </div>

        <!-- Spielplan Tab -->
        <div id="schedule-content" class="tab-content hidden">
          <!-- Wird von schedule.js gefüllt -->
        </div>

        <!-- Playoffs Tab -->
        <div id="playoffs-content" class="tab-content hidden">
          <!-- Wird von playoffs.js gefüllt -->
        </div>
      </div>
    </div>

    <!-- JavaScript Dateien -->
    <script src="assets/js/app.js"></script>
    <script src="assets/js/create.js"></script>
    <script src="assets/js/groups.js"></script>
    <script src="assets/js/schedule.js"></script>
    <script src="assets/js/playoffs.js"></script>
  </body>
</html>
