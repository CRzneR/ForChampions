<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Turnier Manager</title>
    <link rel="stylesheet" href="assets/css/tailwind.css" />
    <link rel="stylesheet" href="assets/css/style.css" />

    <style>
      .login-modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.7);
        z-index: 1000;
        justify-content: center;
        align-items: center;
      }
      .login-content {
        background-color: #21222d;
        padding: 2rem;
        border-radius: 0.5rem;
        width: 400px;
        max-width: 90%;
      }
      .form-input {
        background-color: #2d3748;
        border: 1px solid #4a5568;
        color: white;
        padding: 0.75rem;
        border-radius: 0.25rem;
        width: 100%;
        margin-bottom: 1rem;
      }
      .form-input:focus {
        outline: none;
        border-color: #ca5818;
      }
    </style>
  </head>
  <body class="bg-[#14181D]">
    <!-- Login Modal -->
    <div id="login-modal" class="login-modal">
      <div class="login-content">
        <h2 class="text-2xl font-bold text-white mb-4 text-center">Login</h2>
        <form id="login-form">
          <div class="mb-4">
            <label class="block text-gray-300 mb-2" for="login-username"
              >Benutzername</label
            >
            <input
              class="form-input"
              id="login-username"
              type="text"
              required
            />
          </div>
          <div class="mb-6">
            <label class="block text-gray-300 mb-2" for="login-password"
              >Passwort</label
            >
            <input
              class="form-input"
              id="login-password"
              type="password"
              required
            />
          </div>
          <div class="flex justify-between items-center">
            <button
              type="button"
              id="login-submit"
              class="bg-[#CA5818] hover:bg-[#EF1475] text-white font-bold py-2 px-4 rounded"
            >
              Einloggen
            </button>
            <button
              type="button"
              id="login-close"
              class="text-gray-400 hover:text-white"
            >
              Abbrechen
            </button>
          </div>
          <p id="login-error" class="text-red-500 mt-3 hidden"></p>
        </form>
      </div>
    </div>

    <!-- Hauptnavigation oben -->
    <nav class="bg-[#21222D] shadow-md">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
          <div class="flex items-center">
            <div class="flex-shrink-0 flex items-center">
              <img
                class="h-8 w-auto"
                src="https://avatar.iran.liara.run/public"
                alt="Logo"
              />
              <span
                class="ml-2 text-xl font-bold hidden"
                id="tournament-title"
              ></span>
              <span
                class="ml-2 text-xl font-bold text-4xl font-bold bg-gradient-to-r from-[#CA5818] to-[#EF1475] bg-clip-text text-transparent"
                id="app-title"
                >For Champions</span
              >
            </div>
          </div>
          <div class="flex items-center">
            <div id="user-auth" class="hidden">
              <span id="username-display" class="text-white mr-4"></span>
              <button id="logout-btn" class="text-gray-400 hover:text-white">
                Abmelden
              </button>
            </div>
            <div id="guest-auth">
              <button id="login-btn" class="text-gray-400 hover:text-white">
                Anmelden
              </button>
            </div>
          </div>
        </div>
      </div>
    </nav>

      <!-- Hauptinhalt -->

        <!-- Dashboard Tab -->
        <div id="dashboard-content" class="tab-content hidden">
          <!-- Wird von dashboard.js gefüllt -->

        <!-- Turnier erstellen Tab -->
        <div id="create-content" class="tab-content hidden">
          <!-- Wird von create.js gefüllt -->
        </div>

        <!-- Gruppen Tab -->
        <div id="groups-content" class="tab-content hidden">
          <!-- Wird von groups.js gefüllt -->
        </div>

        <!-- Spielplan Tab -->

          <!-- Wird von schedule.js gefüllt -->

    <!-- JavaScript Dateien -->
    <script>
      // Login System
      document.addEventListener("DOMContentLoaded", function () {
        // DOM Elements
        const loginModal = document.getElementById("login-modal");
        const loginBtn = document.getElementById("login-btn");
        const logoutBtn = document.getElementById("logout-btn");
        const loginClose = document.getElementById("login-close");
        const loginSubmit = document.getElementById("login-submit");
        const loginError = document.getElementById("login-error");
        const userAuth = document.getElementById("user-auth");
        const guestAuth = document.getElementById("guest-auth");
        const usernameDisplay = document.getElementById("username-display");

        // Check if user is logged in
        function checkAuth() {
          const token = localStorage.getItem("authToken");
          const user = localStorage.getItem("user");

          if (token && user) {
            const userData = JSON.parse(user);
            userAuth.classList.remove("hidden");
            guestAuth.classList.add("hidden");
            usernameDisplay.textContent = userData.username;
          } else {
            userAuth.classList.add("hidden");
            guestAuth.classList.remove("hidden");
          }
        }

        // Show login modal
        loginBtn.addEventListener("click", () => {
          loginModal.style.display = "flex";
        });

        // Close login modal
        loginClose.addEventListener("click", () => {
          loginModal.style.display = "none";
          loginError.classList.add("hidden");
        });

        // Login submit
        loginSubmit.addEventListener("click", async () => {
          const username = document.getElementById("login-username").value;
          const password = document.getElementById("login-password").value;

          try {
            // Hier würden Sie normalerweise eine API-Anfrage machen
            // Für dieses Beispiel simulieren wir eine erfolgreiche Anmeldung
            // Ersetzen Sie dies mit einem echten API-Aufruf:
            // const response = await fetch('/api/auth/login', {
            //   method: 'POST',
            //   headers: { 'Content-Type': 'application/json' },
            //   body: JSON.stringify({ username, password })
            // });
            // const data = await response.json();

            // Simulierte Antwort
            const data = {
              token: "simulated-token-" + Math.random().toString(36).substr(2),
              userId: 1,
              username: username,
            };

            // if (!response.ok) throw new Error(data.message || 'Login fehlgeschlagen');

            // Speichern der Benutzerdaten
            localStorage.setItem("authToken", data.token);
            localStorage.setItem(
              "user",
              JSON.stringify({
                id: data.userId,
                username: data.username,
              })
            );

            // UI aktualisieren
            loginModal.style.display = "none";
            checkAuth();
            document.getElementById("login-username").value = "";
            document.getElementById("login-password").value = "";
          } catch (error) {
            loginError.textContent = error.message || "Login fehlgeschlagen";
            loginError.classList.remove("hidden");
          }
        });

        // Logout
        logoutBtn.addEventListener("click", () => {
          localStorage.removeItem("authToken");
          localStorage.removeItem("user");
          checkAuth();
        });

        // Initial check
        checkAuth();
      });
    </script>

    <script src="/client/js/groups.js"></script>

    <script src="/client/js/playoffs.js"></script>
    <script src="/client/js/dashboard.js"></script>

</html>
