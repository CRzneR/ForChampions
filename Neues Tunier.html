<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Champions</title>
    <link rel="stylesheet" href="./src/css/style.css">
        <!-- == Box Icons -->
        <script src="https://unpkg.com/boxicons@2.1.4/dist/boxicons.js"></script>
</head>
<body>

    <!-- === Sidebar === -->
    <div class="hero">
        <ul class="links">
            <li><a href="Index.html"><box-icon name='dashboard' type='solid' color='#ffffff' ></box-icon>Übersicht</a></li>
            <li><a href="Gruppen.html"><box-icon name='group' color='#ffffff' ></box-icon>Gruppen</a></li>
            <li><a href="Spielplan.html"><box-icon name='game' color='#ffffff' ></box-icon>Spielplan</a></li>
            <li><a href="#"><box-icon name='stats' color='#ffffff' ></box-icon>Statistik</a></li>
            <li><a href="Neues Tunier.html"><box-icon name='add-to-queue' color='#ffffff' ></box-icon>Neues Tunier</a></li>
            <li><a href="#"><box-icon name='cog' color='#ffffff' ></box-icon>Einstellungen</a></li>
            <li><a href="#"><box-icon name='log-in-circle' color='#ffffff' ></box-icon>Log in</a></li>
        </ul>
    </div>

    <div class="top">
        <img id="logo" src="./src/img/logo_white.png"></a>
        <span id="FC">For Champions</span>
        <div>
            <box-icon name='notification' color='#ffffff' ></box-icon>
            <img src="./src/img/beerpong_1.jpg"></img>
            <p id="Name">Chris</p>
        </div>
    </div>
    <!-- === Main  === -->
    <div class="dashboard forForm">
        <div class="containerForm">
            <form id="form1" class="multiForm" action="#" method="get">
                <div>
                    <label for="deinProfil">Titel des Tuniers</label>
                    <input id="deinProfil" type="text" name="deinProfil" placeholder="Name des Erstellers" required>
                    <label for="nameTunier">Titel des Tuniers</label>
                    <input id="nameTunier" type="text" name="nameTunier" placeholder="Name des Tuniers" required>
                </div>
                <div>
                    <button id="next1NT" type="submit">weiter</button>
                </div>
            </form>
            <form id="form2" class="multiForm" action="#" method="get">
                <div>
                    <label for="tournamentName">Titel des Tuniers</label>
                    <input id="tournamentName" type="text" name="tournamentName" placeholder="Name des Turniers" required>
                </div>
                <div>
                    <label for="numberTeams">Anzahl der Teams</label>
                    <input id="numberTeams" type="number" name="numberTeams" placeholder="Anzahl der Teams" required>
                </div>
                <div>
                    <label for="numberGroups">Anzahl der Gruppen</label>
                    <input id="numberGroups" type="number" name="numberGroups" placeholder="Anzahl der Gruppen" required>
                </div>
                <div>    
                    <label for="playoffplaces">Anzahl der Playoffplätze</label>
                    <input id="playoffplaces" type="number" name="playoffplaces" placeholder="Playoff Plätze" required>
                </div>
                <div class="container-button">
                    <button id="backNT" type="submit">zurück</button>
                    <button id="next1NT" type="submit">weiter</button>
                </div>
            </form>

            <div class="stepRow">
                <div id="progress"></div>
                <div class="stepCol"><small>Step 1</small></div>
                <div class="stepCol"><small>Step 2</small></div>
                <div class="stepCol"><small>Step 3</small></div>
            </div>

        </div>
    </div>
    <!-- Monatslisten -->
    <section id="tabelleGruppen" class="tabelleGruppen">

    </section>

<script src="./src/js/Tabelle.js"></script>
<script src="./src/js/Gruppen.js"></script>
<script src="./main.js"></script>

</body>

</html>
